name: Docker 镜像发布

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: 构建并推送多架构镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: couei/canana-vue
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_PROVIDER_DEFAULT_BASE_URL: ${{ vars.VITE_PROVIDER_DEFAULT_BASE_URL || 'https://api.chatfire.site/v1' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 读取 package.json 版本号
        id: package-version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.package-version.outputs.version }},enable=${{ steps.package-version.outputs.version != '' }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_PROVIDER_DEFAULT_BASE_URL=${{ env.VITE_PROVIDER_DEFAULT_BASE_URL }}
