name: Docker 镜像发布

# 触发条件：
# - push 到 master（我们自己的改造分支）
# - 打 v* tag（发布版本）
# - 手动触发
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: 构建并推送多架构镜像到 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送镜像到 GHCR 必需
    env:
      # 推送到本仓库所属账号的 GHCR：ghcr.io/<owner>/canvasmind
      # 使用 github.repository_owner，fork/转移后无需改名。
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/canvasmind
      # 前端构建期变量（同域部署留空即可，走同源请求）。
      # 在仓库 Settings → Secrets and variables → Variables 配置：
      #   VITE_API_BASE_URL / VITE_PROVIDER_DEFAULT_BASE_URL
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_PROVIDER_DEFAULT_BASE_URL: ${{ vars.VITE_PROVIDER_DEFAULT_BASE_URL || 'https://api.chatfire.site/v1' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 读取 package.json 版本号
        id: package-version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 登录 GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=v${{ steps.package-version.outputs.version }},enable=${{ steps.package-version.outputs.version != '' }}
            type=ref,event=tag
            type=sha,format=short

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_PROVIDER_DEFAULT_BASE_URL=${{ env.VITE_PROVIDER_DEFAULT_BASE_URL }}
